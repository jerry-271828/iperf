name: Build iperf3 for HarmonyOS (OHOS)

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'configure.ac'
      - 'configure'
      - 'Makefile.am'
      - 'harmony/**'
      - '.github/workflows/build-ohos.yml'
  workflow_dispatch:

env:
  # OpenHarmony SDK (pinned). Update these to use a newer SDK version.
  # Browse available builds: https://ci.openharmony.cn/workbench/cicd/dailybuild/dailylist
  OHOS_SDK_VERSION: "20250819_020817"
  OHOS_SDK_URL: >-
    https://cidownload.openharmony.cn/version/Master_Version/ohos-sdk-full_ohos/20250819_020817/version-Master_Version-ohos-sdk-full_ohos-20250819_020817-ohos-sdk-full_ohos.tar.gz
  # HarmonyOS Command-Line Tools (for HAP build)
  CLT_BASE_URL: https://github.com/jerry-271828/harmonyos-commandline-tools/releases/download/v26.0.0.461
  CLT_SHA256: b046da0a1a06fe13b3d82d198738abc54788d79c6c9d07c36617ec7fc31a3b3b

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache OHOS Native SDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/ohos-ndk
          key: ohos-ndk-${{ env.OHOS_SDK_VERSION }}

      - name: Download & extract OHOS Native SDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP"

          echo "::group::Download OHOS SDK"
          curl -fSL --retry 3 --connect-timeout 120 -o ohos-sdk.tar.gz "$OHOS_SDK_URL"
          echo "::endgroup::"

          echo "::group::Extract native SDK component"
          mkdir -p _extract
          tar -xzf ohos-sdk.tar.gz -C _extract
          native_zip=$(find _extract -name 'native-linux-x64-*.zip' | head -1)
          if [ -z "$native_zip" ]; then
            echo "ERROR: native-linux-x64-*.zip not found in SDK tarball"
            find _extract -name '*.zip' -printf '  %p\n'
            exit 1
          fi
          echo "Found: $native_zip"
          unzip -qo "$native_zip" -d ohos-ndk
          echo "::endgroup::"

          # Fix sysroot lib paths (some build systems expect libs directly in usr/lib/)
          if [ -d ohos-ndk/native/sysroot/usr/lib/aarch64-linux-ohos ]; then
            cp -an ohos-ndk/native/sysroot/usr/lib/aarch64-linux-ohos/* \
                   ohos-ndk/native/sysroot/usr/lib/ 2>/dev/null || true
          fi

          rm -rf ohos-sdk.tar.gz _extract
          echo "NDK ready at $RUNNER_TEMP/ohos-ndk/native"
          ls "$RUNNER_TEMP/ohos-ndk/native/"

      - name: Cross-compile iperf3 for aarch64-linux-ohos
        run: |
          set -euo pipefail
          NDK="${RUNNER_TEMP}/ohos-ndk/native"

          export CC="${NDK}/llvm/bin/clang"
          export AR="${NDK}/llvm/bin/llvm-ar"
          export RANLIB="${NDK}/llvm/bin/llvm-ranlib"
          export STRIP="${NDK}/llvm/bin/llvm-strip"
          export CFLAGS="--target=aarch64-linux-ohos --sysroot=${NDK}/sysroot -O2 -Wall"
          export LDFLAGS="--target=aarch64-linux-ohos --sysroot=${NDK}/sysroot"

          # OHOS sysroot: linux/tcp.h pulls in linux/socket.h which
          # redefines sockaddr_storage (conflicts with sys/socket.h).
          # Force configure to skip linux/tcp.h so netinet/tcp.h is used.
          ./configure \
            --build=x86_64-linux-gnu \
            --host=aarch64-linux-ohos \
            --without-openssl \
            --without-sctp \
            --enable-static-bin \
            --without-ldconfig \
            --prefix=/usr \
            ac_cv_header_linux_tcp_h=no

          make -j"$(nproc)" V=1

          echo "=== Build result ==="
          IPERF_BIN=src/iperf3
          [ -f src/.libs/iperf3 ] && IPERF_BIN=src/.libs/iperf3
          file "$IPERF_BIN"
          echo "IPERF_BIN=$IPERF_BIN" >> "$GITHUB_ENV"

      - name: Create HNP package
        run: |
          set -euo pipefail
          NDK="${RUNNER_TEMP}/ohos-ndk/native"
          STRIP="${NDK}/llvm/bin/llvm-strip"

          VERSION=$(sed -n 's/.*AC_INIT(\[iperf\],\[\([^]]*\)\],.*/\1/p' configure.ac)
          # Sanitize version for HNP (remove trailing + etc.)
          HNP_VERSION=$(echo "$VERSION" | sed 's/[^0-9.]//g')

          mkdir -p hnp-staging/bin
          cp "$IPERF_BIN" hnp-staging/bin/iperf3
          "$STRIP" hnp-staging/bin/iperf3

          printf '{\n  "type": "hnp-config",\n  "name": "iperf3",\n  "version": "%s",\n  "install": {\n    "links": [\n      { "source": "bin/iperf3", "target": "iperf3" }\n    ]\n  }\n}\n' "$HNP_VERSION" > hnp-staging/hnp.json

          cd hnp-staging
          zip -r "../iperf3-${HNP_VERSION}-aarch64-ohos.hnp" .
          cd ..

          echo "=== HNP package ==="
          ls -lh iperf3-*.hnp
          unzip -l iperf3-*.hnp
          echo "HNP_FILE=iperf3-${HNP_VERSION}-aarch64-ohos.hnp" >> "$GITHUB_ENV"
          echo "HNP_VERSION=${HNP_VERSION}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: iperf3-ohos-aarch64
          path: iperf3-*.hnp
          if-no-files-found: error

      # ── HAP build (wraps iperf3 binary in an installable HarmonyOS app) ──

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache HarmonyOS CLI tools
        id: cache-clt
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/command-line-tools
          key: harmonyos-clt-v26.0.0.461

      - name: Download HarmonyOS CLI tools
        if: steps.cache-clt.outputs.cache-hit != 'true'
        run: |
          cd "$RUNNER_TEMP"
          curl -fsSL --retry 3 -O "$CLT_BASE_URL/clt.zip.part00" -O "$CLT_BASE_URL/clt.zip.part01"
          cat clt.zip.part00 clt.zip.part01 > clt.zip
          rm -f clt.zip.part00 clt.zip.part01
          echo "$CLT_SHA256  clt.zip" | sha256sum -c
          unzip -q clt.zip
          rm -f clt.zip

      - name: Prepare HAP project
        run: |
          set -euo pipefail
          CLT="${RUNNER_TEMP}/command-line-tools"
          echo "$CLT/bin" >> "$GITHUB_PATH"
          echo "$CLT/tool/node/bin" >> "$GITHUB_PATH"
          echo "DEVECO_SDK_HOME=$CLT/sdk" >> "$GITHUB_ENV"

          # Copy iperf3 binary into rawfile
          mkdir -p harmony/entry/src/main/resources/rawfile
          NDK="${RUNNER_TEMP}/ohos-ndk/native"
          cp "$IPERF_BIN" harmony/entry/src/main/resources/rawfile/iperf3
          "${NDK}/llvm/bin/llvm-strip" harmony/entry/src/main/resources/rawfile/iperf3

          # Generate build-profile.json5 for CI SDK version
          printf '%s\n' '{' \
            '  "app": {' \
            '    "signingConfigs": [],' \
            '    "products": [{' \
            '      "name": "default",' \
            '      "signingConfig": "default",' \
            '      "compileSdkVersion": "26.0.0(26.0.0)",' \
            '      "compatibleSdkVersion": "5.0.0(12)",' \
            '      "targetSdkVersion": "26.0.0(26.0.0)",' \
            '      "runtimeOS": "HarmonyOS"' \
            '    }],' \
            '    "buildModeSet": [{"name":"debug"},{"name":"release"}]' \
            '  },' \
            '  "modules": [{' \
            '    "name": "entry",' \
            '    "srcPath": "./entry",' \
            '    "targets": [{"name":"default","applyToProducts":["default"]}]' \
            '  }]' \
            '}' > harmony/build-profile.json5

      - name: Build HAP
        working-directory: harmony
        run: |
          ohpm config set registry https://ohpm.openharmony.cn/ohpm/
          ohpm install --all
          hvigorw --mode module -p product=default -p buildMode=release assembleHap --no-daemon

      - name: Collect HAP artifact
        run: |
          hap=$(find harmony/entry/build -name '*.hap' | head -1)
          if [ -z "$hap" ]; then echo "ERROR: no .hap found"; exit 1; fi
          cp "$hap" "iperf3-${HNP_VERSION}-aarch64-ohos.hap"
          echo "HAP_FILE=iperf3-${HNP_VERSION}-aarch64-ohos.hap" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: iperf3-ohos-hap
          path: iperf3-*.hap
          if-no-files-found: error

      - name: Publish release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sha7="${GITHUB_SHA::7}"
          tag="ohos-v${HNP_VERSION}"

          dst_hnp="${RUNNER_TEMP}/${HNP_FILE%.hnp}-${sha7}.hnp"
          cp "$HNP_FILE" "$dst_hnp"
          dst_hap="${RUNNER_TEMP}/${HAP_FILE%.hap}-${sha7}.hap"
          cp "$HAP_FILE" "$dst_hap" 2>/dev/null || true

          gh release delete "$tag" --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" 2>/dev/null || true

          assets=("$dst_hnp")
          [ -f "$dst_hap" ] && assets+=("$dst_hap")

          notes="Cross-compiled iperf3 for HarmonyOS NEXT (aarch64).

          ## Install via HAP
          \`\`\`bash
          hdc install iperf3-*.hap
          # Launch app to extract binary, then:
          hdc shell /data/app/el2/100/base/com.iperf3.tool/haps/entry/files/iperf3 -v
          \`\`\`

          ## Install via HNP (standalone)
          \`\`\`bash
          hdc file send iperf3-*.hnp /data/local/tmp/
          hdc shell hnp install /data/local/tmp/iperf3-*.hnp
          \`\`\`"

          gh release create "$tag" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "iperf3 ${HNP_VERSION} for HarmonyOS (${sha7})" \
            --prerelease \
            --notes "$notes"
